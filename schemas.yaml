# Pulse — fleet configuration
#
# Two ways to declare schemas:
#   1. `auto_discover` — scan a catalog at startup and pick every schema matching
#      a glob pattern. No hand-maintained list; picks up new schemas automatically.
#   2. `schemas` — explicit entries (useful for cross-catalog schemas or one-offs).
#
# Per-schema knobs (protos path, aliases, tighter PHI patterns) can be set in
# `overrides` keyed by schema id (= schema name).

auto_discover:
  catalogs: [prod]           # catalogs to scan
  include: ["hs_*", "mixpanel_*"]  # glob patterns for schema names
  # Skip Fivetran staging clones — they're Mixpanel-raw-replica schemas that
  # duplicate the main tables. Keep the canonical ones (mixpanel_phoenix,
  # mixpanel_care_team, mixpanel_coaching, mixpanel_onboarding, mixpanel_carehub_app).
  exclude:
    - "*_stg_mixpanel"
    - "*_mixpanel_mixpanel"   # if this double-suffix pattern exists
    - "mixpanel_*_mixpanel"

defaults:
  # Which schemas are queryable at startup. Supports:
  #   all | <id> | <id1>,<id2> | <catalog>.* | <glob> | mixed combinations
  #   (e.g. "hs_*,mixpanel_*" to activate every schema matching either glob)
  #
  # Only the first schema touched pays the one-time KG build cost; questions
  # are routed through a cheap Haiku pre-filter that picks the 1-3 most
  # relevant schemas per question.
  #
  # Pin to a single schema (e.g. `active: hs_graph`) if you want to scope
  # every question to that schema only — routing is skipped when active = 1.
  active: hs_*,mixpanel_*

  # Baseline PHI-unsafe column-name patterns. Case-insensitive substring match.
  phi_skip_patterns:
    - name
    - first_name
    - last_name
    - email
    - phone
    - ssn
    - dob
    - date_of_birth
    - address
    - street
    - city

  # Applied to every discovered schema unless the schema has its own override.
  phi_skip_patterns_add:
    - mrn
    - patient_id
    - member_id
    - subscriber_id
    - ip_address
    - device_id

  # When active schemas > threshold, a cheap Haiku pre-filter routes each
  # question to 1-3 schemas before the main classifier runs.
  large_fleet_threshold: 10

# Per-schema overrides — keyed by schema name (the id). Everything here is
# optional; unset fields inherit from defaults.
overrides:
  hs_graph:
    aliases: [hs, graph, kg]
    protos: protos/
    # phi_skip_patterns_add:
    #   - additional_phi_column_name

  mixpanel_phoenix:
    # Strong aliases matter — the router uses these heavily when the schema
    # hasn't been built yet. "care_search", "clicks", "funnel", and "product_analytics"
    # all route question keywords toward this schema.
    aliases:
      - phoenix
      - product_analytics
      - product_events
      - care_search
      - care_search_events
      - clicks
      - funnel
      - user_behavior
      - user_analytics
      - app_events
      - engagement
    # Event tables can have 100M+ rows. The default 1M cap would skip DISTINCT
    # sampling on the `event_name` column, which is exactly the column Claude
    # needs to learn the event taxonomy (e.g. "Care Search Opened",
    # "Care Search Result Clicked"). Override to a much higher cap.
    distinct_sampling_row_cap: 500_000_000
    # Curated topic doc that lists known Care Search funnel stages, identifier
    # columns, and known data-quality issues. Loaded into KG build context.
    notes_doc: docs/mixpanel_phoenix.md
    phi_skip_patterns_add:
      # Device/user identifiers that Mixpanel routinely carries
      - distinct_id
      - device_id
      - $device_id
      - ip
      - $ip
      - user_agent
      - $user_agent
      - browser
      - $browser

  mixpanel_care_team:
    aliases: [care_team_events]
    distinct_sampling_row_cap: 500_000_000
    phi_skip_patterns_add:
      - distinct_id
      - device_id
      - ip

  mixpanel_coaching:
    aliases: [coaching_events]
    distinct_sampling_row_cap: 500_000_000
    phi_skip_patterns_add:
      - distinct_id
      - device_id
      - ip
